services:
  - type: web
    name: barrett-score
    runtime: python
    # Pin Python to 3.12 — Render's default moved to 3.14, which has no wheels
    # for the pinned pyarrow/numpy (forces a from-source build that fails on the
    # build image). 3.12 is the version every pinned wheel targets. Also set via
    # .python-version + runtime.txt so the version is honored however Render reads it.
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
    # SEO: bake the crawlable index.html patch into the image at build time
    # (writable here regardless of runtime fs); serve.py re-applies it at startup
    # as a backup. Idempotent; never fails the build.
    buildCommand: pip install -r requirements.txt && python scripts/seo_patch.py
    # serve.py pre-imports the heavy modules and warms the current-season
    # caches BEFORE opening the port. Render keeps the old container serving
    # until the new one listens (and passes the health check), so post-deploy
    # cold starts are invisible to visitors.
    startCommand: python serve.py
    healthCheckPath: /healthz
    plan: starter          # $7/mo — always-on, no spin-down
    disk:
      name: barrett-cache
      mountPath: /data     # CACHE_DIR in utils.py checks for /data/cache here
      sizeGB: 1            # ~$1.50/mo — holds all season parquet files easily
